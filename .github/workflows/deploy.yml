name: Deploy frontend til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package.json

      - name: Installér afhængigheder
        working-directory: app/frontend
        run: npm install

      - name: Byg frontend
        working-directory: app/frontend
        env:
          # URL til din backend på Render – tilføj denne som GitHub Secret
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Sættes automatisk til /repo-navn/ så GitHub Pages-stien passer
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
