services:
  - type: web
    name: praktikvurdering-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # Udfyldes manuelt i Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o
